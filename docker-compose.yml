services:
  postgres:
    image: postgres:16-alpine
    container_name: velas-cristal-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: velas_cristal
      POSTGRES_USER: velas
      POSTGRES_PASSWORD: velas123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U velas -d velas_cristal"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
