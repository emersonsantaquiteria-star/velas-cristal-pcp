name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://velas:velas123@localhost:5432/velas_cristal
      NEXT_PUBLIC_API_URL: http://localhost:4000/api
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Validate Prisma schema
        run: pnpm --filter velas-cristal-backend exec prisma validate

      - name: Build backend
        run: pnpm --filter velas-cristal-backend build

      - name: Build frontend
        run: pnpm --filter velas-cristal-frontend build
